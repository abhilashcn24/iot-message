<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>WhatsApp Form</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 12px;
      width: 350px;

      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input,
    textarea {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      padding: 12px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <form id="form">

    <h2>WhatsApp Form</h2>

    <input
      type="text"
      name="name"
      placeholder="Enter Name"
      required
    />

    <input
      type="email"
      name="email"
      placeholder="Enter Email"
      required
    />

    <input
      type="text"
      name="phone"
      placeholder="Enter Phone"
      required
    />

    <textarea
      name="message"
      placeholder="Enter Message"
      required
    ></textarea>

    <input
      type="file"
      name="image"
      accept="image/*"
    />

    <button type="submit">
      Send WhatsApp
    </button>

  </form>

  <script>

    const form = document.getElementById("form");

    // Backend base URL: use http://localhost:PORT while developing, or your ngrok HTTPS URL when testing from the phone / public web.
    const API_BASE = "http://localhost:3000";

    form.addEventListener("submit", async (e) => {

      e.preventDefault();

      const formData = new FormData(form);

      try {

        const response = await fetch(`${API_BASE}/submit-form`, {
          method: "POST",
          body: formData,
        });

        const data = await response.json();

        console.log(data);

        if (data.success) {
          const extra = data.imageNote ? `\n\n${data.imageNote}` : "";
          alert("WhatsApp message sent successfully!" + extra);
        } else {
          alert(data.error || "Failed to send WhatsApp message");
        }

      } catch (error) {

        console.error(error);

        alert("Something went wrong");

      }

    });

  </script>

</body>
</html>
